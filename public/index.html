<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroPlay</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand">🎮 RetroPlay</span>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Jogos</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Categorias</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contato</a></li>
      </ul>
    </div>
  </nav>
</header>

<main class="container mt-4">
  <div class="row">
    <div class="col-12">
      <img src="../img/banner.jpg" class="img-fluid" alt="Banner">
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-12">
      <p>Explore jogos clássicos com retrocompatibilidade.</p>
    </div>
  </div>
</main>

<section class="container mt-4">
  <div class="row">

    <div class="col-md-4">
      <div class="card">
        <img src="../img/card1.jpg" class="card-img-top">
        <div class="card-body">
          <h5>Super Mario</h5>
          <p>Clássico da Nintendo.</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="../img/card2.jpg" class="card-img-top">
        <div class="card-body">
          <h5>Zelda</h5>
          <p>Aventura épica.</p>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card">
        <img src="../img/card3.jpg" class="card-img-top">
        <div class="card-body">
          <h5>Sonic</h5>
          <p>Velocidade retrô.</p>
        </div>
      </div>
    </div>

  </div>
</section>

<footer class="bg-dark text-white text-center p-3 mt-4">
  <p>© RetroPlay</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

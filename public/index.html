<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroPlay - Jogos Clássicos</title>

    <!-- SEU CSS (mantido) -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Bootstrap (ADICIONADO) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <div class="header-logo container d-flex justify-content-between align-items-center">
        <div>
            <span class="logo-icon">🎮</span>
            <span class="logo-text">Retro<span class="logo-accent">Play</span></span>
        </div>

        <nav class="nav">
            <ul class="nav-list d-flex gap-3">
                <li><a href="#inicio" class="nav-link">Início</a></li>
                <li><a href="#jogos" class="nav-link">Jogos</a></li>
                <li><a href="#categorias" class="nav-link">Categorias</a></li>
                <li><a href="#sobre" class="nav-link">Sobre</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- ================= MAIN ================= -->
<main class="container mt-4">

    <!-- BANNER -->
    <div class="row">
        <div class="col-12">
            <img src="../img/banner.jpg" class="img-fluid" alt="Banner">
        </div>
    </div>

    <!-- TEXTO -->
    <div class="row mt-3">
        <div class="col-12">
            <p>
                Bem-vindo ao RetroPlay! Explore jogos clássicos com retrocompatibilidade e reviva a nostalgia dos games antigos.
            </p>
        </div>
    </div>

</main>

<!-- ================= SECTION (CARDS) ================= -->
<section class="container mt-4">
    <div class="row">

        <div class="col-md-4 mb-3">
            <div class="card">
                <img src="../img/card1.jpg" class="card-img-top img-fluid" alt="">
                <div class="card-body">
                    <h5 class="card-title">Super Mario</h5>
                    <p class="card-text">Clássico da Nintendo.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card">
                <img src="../img/card2.jpg" class="card-img-top img-fluid" alt="">
                <div class="card-body">
                    <h5 class="card-title">Zelda</h5>
                    <p class="card-text">Aventura épica.</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card">
                <img src="../img/card3.jpg" class="card-img-top img-fluid" alt="">
                <div class="card-body">
                    <h5 class="card-title">Sonic</h5>
                    <p class="card-text">Velocidade retrô.</p>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="footer text-center mt-4 p-3">
    <p>© RetroPlay - Jogos Clássicos</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
